name: Maven Build

on:
  push:

jobs:

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Set up OWASP database cache key and restore keys
        run: |
          echo "YEAR=$(date -u +'%Y')" >> "$GITHUB_ENV"
          echo "MONTH=$(date -u +'%Y-%m')" >> "$GITHUB_ENV"
          echo "DAY=$(date -u +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "HOUR=$(date -u +'%Y-%m-%d-%H')" >> "$GITHUB_ENV"
      - name: Cache OWASP database
        uses: actions/cache@v6
        with:
          path: target/owasp/data
          key: owasp-data-${{ env.HOUR }}
          restore-keys: |
            owasp-data-${{ env.DAY }}
            owasp-data-${{ env.MONTH }}
            owasp-data-${{ env.YEAR }}
            owasp-data-
            owasp-data
      - name: Build with Maven
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B verify --file pom.xml
